<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Repair: Connect the Grid</title>
    <style>
        :root {
            --bg-color: #050508;
            --board-bg: #0c0d14;
            --neon-off: #1f2335;
            --neon-on: #00ffcc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.6rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00ffcc, #ff0055);
            background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 0.85rem;
            color: #666;
            margin: 5px 0 0 0;
        }

        .game-container {
            background: var(--board-bg);
            border: 2px solid #1a1d29;
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(4, 75px);
            gap: 10px;
        }

        .tile {
            background: #11131c;
            border: 1px solid #1f2335;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
        }

        .tile:active {
            transform: scale(0.92);
        }

        .wire {
            position: absolute;
            background-color: var(--neon-off);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .tile.straight .wire {
            width: 100%;
            height: 6px;
        }

        .tile.corner .wire-1 {
            width: 55%;
            height: 6px;
            left: 45%;
        }
        .tile.corner .wire-2 {
            width: 6px;
            height: 55%;
            top: 45%;
        }

        .tile.connected .wire {
            background-color: var(--neon-on);
            box-shadow: 0 0 12px var(--neon-on);
        }
        
        .tile.connected {
            background: #132224;
            border-color: rgba(0, 255, 204, 0.2);
        }

        .tile.source::before, .tile.sink::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            z-index: 2;
        }

        .tile.source::before {
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
        }

        .tile.sink::before {
            background: #ff0055;
            box-shadow: 0 0 15px #ff0055;
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 330px;
            margin-top: 20px;
            padding: 0 5px;
        }

        .level-text {
            font-size: 1rem;
            font-weight: bold;
            color: #aaa;
        }

        .btn {
            background: #11131c;
            border: 1px solid #1f2335;
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:active {
            background: #00ffcc;
            border-color: #00ffcc;
            color: #000;
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.93);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 10;
        }

        .win-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .win-overlay h2 {
            color: var(--neon-on);
            text-shadow: 0 0 15px var(--neon-on);
            margin: 0 0 15px 0;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CYBER REPAIR</h1>
        <p>Rotate tiles to stream the neon power</p>
    </div>

    <div class="game-container">
        <div class="grid" id="gameGrid"></div>
        
        <div class="win-overlay" id="winOverlay">
            <h2 id="winMessage">SYSTEM ONLINE</h2>
            <button class="btn" id="nextBtn" onclick="nextLevel()">NEXT LEVEL</button>
        </div>
    </div>

    <div class="status-panel">
        <div class="level-text" id="levelDisplay">LEVEL: 1</div>
        <button class="btn" onclick="resetLevel()">RESET</button>
    </div>

    <script>
        const gridElement = document.getElementById('gameGrid');
        const levelDisplay = document.getElementById('levelDisplay');
        const winOverlay = document.getElementById('winOverlay');
        const winMessage = document.getElementById('winMessage');
        const nextBtn = document.getElementById('nextBtn');
        
        let currentLevel = 1;
        let tiles = [];
        const maxLevels = 3;

        const levelLayouts = {
            1: [
                { type: 'straight', rotation: 90, isSource: true }, { type: 'corner', rotation: 90 }, { type: 'straight', rotation: 0 }, { type: 'corner', rotation: 180 },
                { type: 'corner', rotation: 0 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 270 }, { type: 'straight', rotation: 0 },
                { type: 'straight', rotation: 0 }, { type: 'corner', rotation: 90 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 90 },
                { type: 'corner', rotation: 0 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 270, isSink: true }, { type: 'straight', rotation: 0 }
            ],
            2: [
                { type: 'corner', rotation: 90, isSource: true }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 180 }, { type: 'straight', rotation: 0 },
                { type: 'straight', rotation: 0 }, { type: 'corner', rotation: 0 }, { type: 'corner', rotation: 270 }, { type: 'straight', rotation: 0 },
                { type: 'corner', rotation: 90 }, { type: 'straight', rotation: 90 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 180 },
                { type: 'straight', rotation: 90 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 270, isSink: true }, { type: 'straight', rotation: 0 }
            ],
            3: [
                { type: 'straight', rotation: 0, isSource: true }, { type: 'corner', rotation: 90 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 180 },
                { type: 'corner', rotation: 0 }, { type: 'corner', rotation: 270 }, { type: 'straight', rotation: 0 }, { type: 'straight', rotation: 0 },
                { type: 'straight', rotation: 0 }, { type: 'straight', rotation: 0 }, { type: 'corner', rotation: 90 }, { type: 'corner', rotation: 180 },
                { type: 'corner', rotation: 90 }, { type: 'straight', rotation: 90 }, { type: 'corner', rotation: 270 }, { type: 'straight', rotation: 0, isSink: true }
            ]
        };

        function initGame() {
            gridElement.innerHTML = '';
            tiles = [];
            winOverlay.classList.remove('active');
            levelDisplay.innerText = `LEVEL: ${currentLevel}`;

            const layout = levelLayouts[currentLevel];

            layout.forEach((data) => {
                const tile = document.createElement('div');
                tile.classList.add('tile', data.type);
                
                if (data.type === 'straight') {
                    const wire = document.createElement('div');
                    wire.classList.add('wire');
                    tile.appendChild(wire);
                } else if (data.type === 'corner') {
                    const wire1 = document.createElement('div');
                    const wire2 = document.createElement('div');
                    wire1.classList.add('wire', 'wire-1');
                    wire2.classList.add('wire', 'wire-2');
                    tile.appendChild(wire1);
                    tile.appendChild(wire2);
                }

                if (data.isSource) tile.classList.add('source');
                if (data.isSink) tile.classList.add('sink');

                let currentRotation = data.isSource || data.isSink ? data.rotation : [0, 90, 180, 270][Math.floor(Math.random() * 4)];
                tile.style.transform = `rotate(${currentRotation}deg)`;

                const tileObj = {
                    element: tile,
                    type: data.type,
                    rotation: currentRotation,
                    targetRotation: data.rotation,
                    isSource: data.isSource || false,
                    isSink: data.isSink || false
                };

                tile.addEventListener('click', () => {
                    if (tileObj.isSource || tileObj.isSink) return;
                    tileObj.rotation = (tileObj.rotation + 90) % 360;
                    tile.style.transform = `rotate(${tileObj.rotation}deg)`;
                    checkConnections();
                });

                gridElement.appendChild(tile);
                tiles.push(tileObj);
            });

            checkConnections();
        }

        function checkConnections() {
            let allCorrect = true;
            
            tiles.forEach(tile => {
                tile.element.classList.remove('connected');
                if (tile.rotation !== tile.targetRotation && !tile.isSource && !tile.isSink) {
                    if (tile.type === 'straight' && Math.abs(tile.rotation - tile.targetRotation) === 180) {
                        // متوافق
                    } else {
                        allCorrect = false;
                    }
                }
            });

            tiles.forEach(tile => {
                if (tile.isSource || tile.rotation === tile.targetRotation || (tile.type === 'straight' && Math.abs(tile.rotation - tile.targetRotation) === 180)) {
                    tile.element.classList.add('connected');
                }
            });

            if (allCorrect) {
                setTimeout(() => {
                    if (currentLevel === maxLevels) {
                        winMessage.innerText = "ALL SYSTEMS REPAIRED! ⚡";
                        nextBtn.innerText = "PLAY AGAIN";
                    } else {
                        winMessage.innerText = "SYSTEM ONLINE";
                        nextBtn.innerText = "NEXT LEVEL";
                    }
                    winOverlay.classList.add('active');
                }, 400);
            }
        }

        function resetLevel() {
            initGame();
        }

        function nextLevel() {
            if (currentLevel === maxLevels) {
                currentLevel = 1;
            } else {
                currentLevel++;
            }
            initGame();
        }

        initGame();
    </script>
</body>
</html>
